syntax = "proto3";

package de.gonicus.gonnect;

// Generic container for any message that is sent to the headless client.
// Every message sent to the client must be wrapped in this container.
message RequestContainer {

    // A tag to identify this "to client" message and relate it to the response
    // in "from client" message. The value 0 means "no identification", i.e. a
    // specific response is not expected.
    uint64 tag = 1;

    // The payload; one of these requests.
    oneof content {
        RemoveMessageRequest removeMessageRequest = 4;
        UserListRequest userListRequest = 6;
        RoomListRequest roomListRequest = 7;
        ToggleReactionRequest toggleReactionRequest = 8;
        InitializationRequest initializationRequest = 9;
        LoginFlowsRequest loginFlowsRequest = 10;
        UsernamePasswordLoginRequest usernamePasswordLoginRequest = 11;
        SSOLoginRequest ssoLoginRequest = 12;
        IdentityProvidersRequest identityProvidersRequest = 13;
        UserSearchRequest userSearchRequest = 14;
        InvitationRequest invitationRequest = 15;
        InvitedReply invitedReply = 16;
        SendMessageRequest sendMessageRequest = 17;
        ChangeMessageRequest changeMessageRequest = 18;
        RoomMessagesRequest roomMessagesRequest = 19;
        MarkAsReadRequest markAsReadRequest = 20;
        RecoveryKeyVerificationRequest recoveryKeyVerificationRequest = 21;
        CrossSigningStartRequest crossSigningStartRequest = 22;
        CrossSigningMethodSelectedRequest crossSigningMethodSelectedRequest = 23;
        CrossSigningAcceptRequest crossSigningAcceptRequest = 24;
        VerificationAbortRequest verificationAbortRequest = 25;
        CreateGroupRoomRequest createGroupRoomRequest = 26;
        CreateDirectRoomRequest createDirectRoomRequest = 27;
        ChangeRoomRequest changeRoomRequest = 28;
        LeaveRoomRequest leaveRoomRequest = 29;
        JoinRoomRequest joinRoomRequest = 30;
        KnockRoomRequest knockRoomRequest = 31;
        PublicRoomListRequest publicRoomListRequest = 32;
    }

    reserved 2, 3, 5;
    reserved "capabilityRequest", "sendOrEditMessageRequest", "loginRequest";
}

// Generic container for any message that is sent from the headless client.
// Every message sent from the client must be wrapped in this container.
message ResponseContainer {

    // A tag to identify which "to client" message this belongs to.
    // The value 0 means "no identification", i.e. the message does not relate
    // to a request.
    uint64 tag = 1;

    // The payload; one of these requests.
    oneof content {
        Error error = 2;
        SendMessageResponse sendMessageResponse = 5;
        RemoveMessageEvent removeMessageEvent = 6;
        MessageReceivedEvent messageReceivedEvent = 7;
        UserListResponse userListResponse = 8;
        RoomListResponse roomListResponse = 9;
        ReactionEvent reactionEvent = 10;
        StatusUpdate statusUpdate = 11;
        LoginFlowsResponse loginFlowsResponse = 13;
        SSOLoginResponse ssoLoginResponse = 14;
        IdentityProvidersResponse identityProvidersResponse = 15;
        UserSearchResponse userSearchResponse = 16;
        InvitedEvent invitedEvent = 17;
        RoomChangeEvent roomChangeEvent = 18;
        RoomMessagesResponse roomMessagesResponse = 19;
        UserChangeEvent userChangeEvent = 20;
        VerificationStatusEvent verificationStatusEvent = 21;
        CrossSigningPromptEvent crossSigningPromptEvent = 22;
        CrossSigningStartEvent crossSigningStartEvent = 23;
        CrossSigningMethodSelectedEvent crossSigningMethodSelectedEvent = 24;
        VerificationEndEvent verificationEndEvent = 25;
        CapabilityEvent capabilityEvent = 26;
        CrossSigningStartResponse crossSigningStartResponse = 27;
        Room roomCreatedEvent = 29;
        RoomLeftEvent roomLeftEvent = 30;
        PublicRoomListResponse publicRoomListResponse = 31;
    }

    reserved 3, 4, 28;
    reserved "capabilityResponse", "loginResponse", "createRoomResponse";
}

// Generic error occurred in the backend or the headless client.
message Error {

    enum errorType {

        // An error that cannot be described by any of the other values or its
        // nature is unknown. Using one of the other more specific error type is
        // preferred.
        Unknown = 0;

        // When a response was not received in a pre-defined time.
        Timeout = 1;

        // The error happened with the network connection or failing transport.
        Network = 2;

        // Whenever the required authorization is missing.
        Authorization = 3;

        // The requested feature is not implemented for this client. This should
        // reflect in CapabilityResponse.
        NotImplemented = 4;

        // The client has not yet been initialized.
        NotInitialized = 5;

        // A string that should have been formatted as an URL was not a valid
        // URL.
        InvalidUrl = 6;

        // The room with the requested ID was not found.
        RoomNotFound = 7;

        // The verification flow with the requested ID was not found.
        VerificationFlowNotFound = 8;

        // The given recovery key is invalid.
        InvalidRecoveryKey = 9;

        // The given user ID is invalid.
        InvalidUserId = 10;
    };

    // The type of this error.
    errorType type = 1;

    // An optional string describing details of the error.
    optional string errorString = 2;
}

// Initializes a client and establishes a connection to the specified backend.
// A StatusUpdate is returned when the connection was successful.
message InitializationRequest {
    // The URL of the backend to which a connection should be established.
    string backendUrl = 1;

    // Path to a readable and writable folder in the system which serves as a
    // root path for mutual data, like images.
    string dataRootPath = 2;

    // Secret for access to the client's secret storage (i.e. database).
    string persistentStorageSecret = 3;

    // Secret the client can use for encryption and decryption of arbitrary
    // data.
    string encryptionSecret = 4;

    // The display name of this device.
    string deviceDisplayName = 5;
}

// Send when the verification status or related information has changed. Must
// be sent at least once if CapabilityResponse.clientVerification is true. If
// that is not true, it must not be sent at all.
message VerificationStatusEvent {

    // Whether this client/device is verified.
    bool isVerified = 1;

    // Whether this client/device can verify itself by sending a recovery key
    // via RecoveryKeyVerificationRequest.
    bool isRecoveryKeyVerificationAvailable = 2;

    // Whether an unverified device can currently be verified via
    // cross-signing.
    bool isCrossSigningAvailable = 3;
}

// Different types of cross signing verification methods.
enum crossSigningMethod {

    // A simple string.
    SasString = 0;

    // A sequence of symbols (e.g. emojis).
    SasSymbol = 1;
}

// Try to verify this device with the givenrecovery key.
// Expects a VerificationEndEvent afterwards.
message RecoveryKeyVerificationRequest {
    string recoveryKey = 1;
}

// Another device wants to verify this one.
// The client is expected to send either a CrossSigningStartRequest in order to
// accept the prompt, or a VerificationAbortRequest to reject it.
message CrossSigningPromptEvent {

    // Identifier for the verification flow id.
    string verificationFlowId = 1;
}

// The client declares it likes to start a cross signing verification process.
// A CrossSigningStartResponse is expected to be received next.
message CrossSigningStartRequest {

    // Id of the flow if responding to a CrossSigningPromptEvent. If such did
    // not happen, this field must be omitted.
    optional string verificationFlowId = 1;

    // All cross signing methods this client supports. It must not be empty.
    repeated crossSigningMethod supportedMethods = 2;
}

// Confirms a new cross signing flow was started.
message CrossSigningStartResponse {
    // The ID  of the newly created verification flow.
    string verificationFlowId = 1;
}

// The backend declares it the cross signing verification flow has started.
// The headless client either expects a CrossSigningMethodSelectRequest next or
// will send a CrossSigningMethodSelectedEvent when another client has selected
// a method sooner.
message CrossSigningStartEvent {
    string verificationFlowId = 1;

    // List of cross signing methods that are available among all clients and
    // the backend. One of this must be chosen to proceed. Must not be empty.
    repeated crossSigningMethod availableMethods = 2;
}

// Send in response to a CrossSigningStartEvent to select the cross signing
// method. A CrossSigningMethodSelectedEvent is expected in return.
message CrossSigningMethodSelectedRequest {
    string verificationFlowId = 1;

    // The selected method. Must be one of those received in the according
    // CrossSigningStartEvent.
    crossSigningMethod selectedMethod = 2;
}

// Propagates the method selected for the cross signing process. Must be
// followed by either a CrossSigningAcceptRequest or a
// VerificationAbortRequest.
message CrossSigningMethodSelectedEvent {
    string verificationFlowId = 1;
    crossSigningMethod selectedMethod = 2;

    // Code to match for the verification. Depends on the selected method.
    oneof verificationCode {

        // A simple string for the SasString method.
        string stringCode = 3;

        // A sequence of symbols for the SasSymbol method.
        VerificationSymbolSequence symbols = 4;
    }
}

// Accepts the verification. Must be followed by VerificationEndEvent.
message CrossSigningAcceptRequest {
    string verificationFlowId = 1;
}

// Sequence of VerificationSymbol.
message VerificationSymbolSequence {
    repeated VerificationSymbol symbols = 1;
}

// A single symbol for the SasSymbol verification method.
message VerificationSymbol {

    // The symbol itself (e.g. emoji).
    string symbol = 1;

    // Optional description to be shown with the symbol.
    optional string description = 2;
}

// This client wants to abort the verification process. Is expected to be
// followed by a VerificationEndEvent.
message VerificationAbortRequest {
    string verificationFlowId = 1;
}

// Send when the verification process has ended, because it was either
// successful, or cancelled or erroneous.
message VerificationEndEvent {

    // Id of the verification flow. Might be omitted if this is a direct final
    // response to the process such that no id was known before.
    optional string verificationFlowId = 1;

    oneof result {
        // Whether the verification has ended successfully or was aborted.
        bool successful = 2;

        // Verification has ended with an error; this is an error message.
        string error = 3;
    }
}

// Request to retrieve the login flows supported by the backend.
message LoginFlowsRequest { }

// Returns the login flows supported by the backend.
message LoginFlowsResponse {

    enum loginFlow {

        // If the backend supports username and password authentication.
        UsernamePassword = 0;

        // If the backend supports single sign-on authentication.
        SSO = 1;
    }

    // The supported login flows.
    repeated loginFlow loginFlows = 2;
}

// Request to log in to the client using username and password.
// Use LoginFlowsRequest to ensure that the backend supports this authentication
// method. A StatusUpdate is returned when the login request was successful.
message UsernamePasswordLoginRequest {
    string username = 1;
    string password = 2;
}

// Request to log in to the client using single sign-on.
// Use LoginFlowsRequest to ensure that the backend supports this authentication
// method.
message SSOLoginRequest {
    // The identity provider to be used for login.
    // Use IdentityProviderRequest to retrieve the available identity providers.
    optional string identityProvider = 1;
}

// Confirms the single sign-on authentication was initiated.
// A StatusUpdate is returned when the login request was successful and the
// access token was retrieved.
message SSOLoginResponse {
    // A url that must be opened in a web browser to continue the login process.
    string loginUrl = 1;
}

// Request to retrieve the available identity providers for single sing-on
// authentication.
message IdentityProvidersRequest { }

// Returns the available identity providers.
message IdentityProvidersResponse {
    // The ID of the available identity providers.
    // Use one of the returned IDs inside the SSOLoginRequest.
    repeated string identityProviders = 1;
}

// Notifies about changes in the connection state between headless client and
// backend.
message StatusUpdate {

    enum statusCode {

        // No connection is made.
        Disconnected = 0;

        // The server is connected, but the client is not authorized yet.
        Connected = 1;

        // The server is connected and the client is authorized.
        LoggedIn = 2;
    };

    // The current connection status.
    statusCode code = 1;
}

// Request the headless client to send the capabilities of the backend.
message CapabilityRequest { }

// The capabilities (supported features) of the backend.
message CapabilityEvent {

    // The backend supports direct communication between two users.
    bool directRooms = 1;

    // The backend supports chat rooms between multiple users.
    bool groupRooms = 2;

    // The backend supports creation of sub threads inside a chat room.
    bool subThreads = 3;

    // The backend supports searching for people known to the chat system.
    bool userSearch = 5;

    // The backend supports inviting users to rooms.
    bool invitations = 6;

    // The backend supports spaces as logical groups of rooms.
    bool spaces = 7;

    // The protocol has a verification process for clients. This does neither
    // mean that the backend actually supports it, nor that the client
    // actually requires verification.
    bool clientVerification = 8;

    // The backend supports a presence state for users.
    bool userPresence = 9;

    // List of MIME types that can be send via the backend.
    repeated string mimeTypes = 4;
}

// Request to send a chat message.
message SendMessageRequest {

    // Id of the room this message is sent to.
    string roomId = 1;

    // The MIME type of the content.
    string mimeType = 2;

    // The actual payload of the message. Encoding depends on mimeType.
    string content = 3;

    // The original message this relates to, e.g. when answering to a specific
    // message.
    optional string relatedMessageId = 4;
}

// Request changes to the content of an existing chat message.
// A MessageReceivedEvent or an Error is expected to be received afterwards.
message ChangeMessageRequest {

    // Id of the chat message that shall be changed.
    string messageId = 1;

    // The new content of the message.
    // This field must not be empty. In order to remove a message, a
    // RemoveMessageRequest must be made.
    string newContent = 2;
}

// Confirms that a message has been sent.
// A MessageReceivedEvent will not be created for messages that have been sent
// via this client.
message SendMessageResponse {

    // Unique id to identify the message (e.g. for later modification).
    string messageId = 1;
}

// Notifies about a received message from another user or an edited message (by
// anyone).
message MessageReceivedEvent {

    // The actual message.
    Message messageContent = 1;
}

// Request the backend to retract and delete an existing message.
// Must result in an Error or RemoveMessageEvent.
message RemoveMessageRequest {

    // Id of the message.
    string messageId = 1;
}

// Event notifying that a message has been retracted and removed.
message RemoveMessageEvent {

    // Id of the removed message.
    string messageId = 1;
}

// Request list of all known users.
message UserListRequest {}

// Response for a user list request.
message UserListResponse {

    // List of users.
    repeated User userList = 1;
}

// Request a list of rooms.
message RoomListRequest {

    // Whether the resulting list shall include room which the user is a member
    // of.
    bool includeJoined = 1;

    // Whether the resulting list shall include room which the user is not a
    // member of.
    bool includeUnjoined = 2;
}

// Response to a RoomListResponse.
message RoomListResponse {

    // The requested list of rooms.
    repeated Room roomList = 1;
}

// Request to have the current reaction status inverted for this user.
message ToggleReactionRequest {

    // The message to change the reaction for.
    string messageId = 1;

    // The reaction (e.g. emoji) to toggle.
    string reaction = 2;
}

// Sent when a reaction was added, removed or has changed in any other way.
// Changes triggered by the user themself are included.
// An empty userList means that this reaction is not valid anymore.
message ReactionEvent {

    // The reaction information.
    Reaction reaction = 1;
}

// Describes a single user entity.
message User {

    // Unique string which identifies the user.
    string userId = 1;

    // Optional nice name to display instead of the userId.
    // An empty string can be interpreted as no displayName set.
    string displayName = 2;

    // The current presence state of the user. May only be set when userPresence
    // capability is set.
    optional PresenceState presenceState = 5;
}

message UserChangeEvent {
    // The ID of the user this change occurs.
    string userId = 1;

    // New presence state of the user. If not set the presence state did not
    // change. May only be set when userPresence capability is set.
    optional PresenceState presenceState = 2;
}

// A space describes a logical group of chat rooms.
message Space {

    // Unique identifier of the space.
    string spaceId = 1;

    // User-friendly display name for the space.
    string displayName = 2;
}

// Possible states that a user can have in a room.
enum UserRoomState {
    Unjoined = 0;
    Joined = 1;
    Invited = 2;
    Knocked = 3;
    Banned = 4;
}

enum PresenceState {
    Unknown = 0;
    Offline = 1;
    Away = 2;
    Online = 3;
}

// Describes a room entity. This might be a room with several users or just a
// direct chat between two.
message Room {

    // Unique string identifying the room.
    string roomId = 1;

    // Nice name to display instead of the roomId.
    // An empty string can be interpreted as no displayName set.
    string displayName = 2;

    // Ids of all users in this room with their current state, including our own
    // user.
    map<string, UserRoomState> userIdList = 3;

    // Ids of the spaces this room belongs to.
    // This is only to be set if the backend supports the spaces capability and
    // the room actually belongs to at least one space.
    repeated string spaceId = 4;

    // Number of unread messages and notifications in this room.
    uint32 unreadCount = 7;

    // If the room is a direct room or group room.
    bool isDirect = 8;

    // The join rule of this room.
    RoomJoinRule joinRule = 9;

    reserved 6;
    reserved "isPublic";
}

// Informs the client about changes in a single room.
message RoomChangeEvent {

    // The id of the room this change occurs.
    string roomId = 1;

    // If the userIdList has changed with this event.
    // If false, the userIdList has not changed and only contains a
    // default value that should not be used.
    bool hasUserIdListChanged = 6;

    // If the typingUserIdList has changed with this event.
    // If false, the typingUserIdList has not changed and only contains a
    // default value that should not be used.
    bool hasTypingUserIdListChanged = 7;

    // User ids and their new state if they have changed. Users with unchanged
    // state must not appear in this list.
    map<string, UserRoomState> userIdList = 2;

    // List of ids of all users which are currently typing.
    repeated string typingUserIdList = 3;

    // Updated display name of the room, if it has changed.
    optional string displayName = 4;

    // Updated number of unread messages and notifications in this room, if it
    // has changed.
    optional uint32 unreadCount = 5;

    // Updated join rule of the room, if it has changed.
    optional RoomJoinRule joinRule = 8;

    // Whether the room is a direct room or not. This should be sent every time,
    // whether it has changed or not.
    bool isDirect = 9;
}

// Notify the client that messages and notifications in this room have been
// read by the user.
// Expects a RoomChangeEvent with unreadCount = 0 in return.
message MarkAsReadRequest {
    string roomId = 1;
}

// Describes a chat message.
message Message {

    // Unique string identifying the message.
    // If the id is set by the backend, this field might be missing when sending
    // a new message.
    optional string messageId = 1;

    // Id of the room this message is sent to.
    string roomId = 2;

    // Id of the sender, which might be a user or the room itself in case of
    // room messages.
    string senderId = 3;

    // Creation time of the message in milliseconds from 01.01.1970 00:00 UTC.
    uint64 timestamp = 4;

    // The MIME type of the content.
    string mimeType = 5;

    // The actual payload of the message. Encoding depends on mimeType.
    string content = 6;

    // The original message this relates to, e.g. when answering to a specific
    // message.
    optional string relatedMessageId = 7;

    // Whether this message is pinned, i.e. prominently shown in the room.
    bool isPinned = 8;
}

// Describes a reaction to a message, e.g. attaching an emoji to it.
// A reaction is identified by messageId and reaction combined.
message Reaction {

    // Id of the message this reaction is for.
    string messageId = 1;

    // The actual reaction (e.g. emoji).
    string reaction = 2;

    // List of all users that made this reaction, including the own user as
    // well. If this list is empty, it means that this reaction does not exist
    // any longer.
    repeated User userList = 3;
}

// Request multiple consecutive messages of a room.
// The request should usually be used paginated, i.e. with a reasonable limit
// set.
message RoomMessagesRequest {

    // Id of the room for which messages shall be fetched.
    string roomId = 1;

    // The result must start at the message that is the immediate predecessor
    // to the one specified by this id, if available. If this field is not set,
    // the result must begin at the latest message.
    optional string fromMessageId = 2;

    // Id of the latest message that should be contained in the result. If the
    // limit field is set as well, the resulting list must be limited at
    // whatever applies first - the toMessageId or the limit.
    optional string toMessageId = 3;

    // Maximum number of messages that should be contained in the resulting
    // list. If the toMessageId field is set as well, the resulting list must
    // be limited at whatever applies first - the toMessageId or the limit.
    optional uint32 limit = 4;
}

// Response to a RoomMessagesRequest containing a list of messages.
message RoomMessagesResponse {
    repeated Message messageList = 1;
}

// Describes a request to search for known users, i.e. accounts registered to
// the chat backend. Only available if the capability userSearch is available.
message UserSearchRequest {

    // The search query string.
    string query = 1;

    // The maximum number of search results that shall be returned.
    uint32 limit = 2;
}

// Response to a UserSearchRequest.
message UserSearchResponse {

    // List of users matching the search query.
    repeated User userList = 1;
}

// Issue an invite to one or more users to join a chat room.
// This is only available if the invitations capability is supported.
// Sending an InvitationRequest without an invitee is insufficient.
message InvitationRequest {

    // The id of the room the users are invited to.
    string roomId = 1;

    // The list of ids of users that shall be invited to the room.
    // Must contain at least one user.
    repeated string invitees = 2;

    // Free text to display to the invitees together with the invitation.
    optional string invitationText = 3;
}

// Received when another user invites this account to a chat room.
message InvitedEvent {

    // The id of the room this client is invited to.
    string roomId = 1;

    // Display name of the room.
    string roomDisplayName = 3;

    // Free text to display to the client together with the invitation.
    optional string invitationText = 2;
}

// The client's answer to an Invited.
message InvitedReply {

    // Id of the room to where the client has been invited.
    string roomId = 1;

    // Whether the invitation is accepted or not. If it is, an update for the
    // room list is expected.
    bool accepted = 2;
}

// Request to create a new room that multiple users can join.
// Expects a RoomCreatedEvent next.
message CreateGroupRoomRequest {

    // Optional nice name to display instead of the roomId.
    // An empty string can be interpreted as no displayName set.
    string displayName = 1;

    // The IDs of the users who should be invited to the new group room.
    repeated string invitees = 2;

    // The join rule of the new room.
    RoomJoinRule joinRule = 4;

    reserved 3;
    reserved "isPublic";
}

// Request to create a new room that only one user can join.
// Expects a RoomCreatedEvent next.
message CreateDirectRoomRequest {

    // Optional nice name to display instead of the roomId or the other person's
    // name. An empty string can be interpreted as no displayName set.
    string displayName = 1;

    // The user who should be invited to the new direct room.
    string invitee = 2;
}

// Request to edit an already existing room.
// Expects a RoomChangeEvent next.
message ChangeRoomRequest {

    // The ID of the room to be edited.
    string roomId = 1;

    // A new display name if it should be changed.
    optional string displayName = 2;

    // New rule of how this room can be joined.
    optional RoomJoinRule joinRule = 4;

    reserved 3;
    reserved "isPublic";
}

// Request to leave a specific room.
// Expects a RoomLeftEvent next.
message LeaveRoomRequest {

    // The ID of the room that should be left.
    string roomId = 1;
}

// Event that is raised when the user has left a specific room.
message RoomLeftEvent {

    enum RoomLeaveReason {
        // The user left the room on their own.
        User = 0;
        // The user was kicked from the room.
        // This might also be sent in response to a Knock request if the user
        // was denied access to the room.
        Kicked = 1;
        // The user was banned from the room.
        Banned = 2;
    }

    // The ID of the room that was left.
    string roomId = 1;

    // The reason why the room was left.
    RoomLeaveReason reason = 2;

    // An optional message to be displayed to the user.
    // This usually contains the reason why the user was kicked or banned from
    // the room. Might be an empty string if no message is set.
    string message = 3;
}

// Request to join an existing room that we can join.
// This means that we are either invited into the room or the room is public.
// Expects a RoomChangeEvent next.
message JoinRoomRequest {

    // The ID of the room that should be joined.
    string roomId = 1;
}

// A request to knock on a room to ask members with permission if we may join.
// A RoomChangeEvent is expected if we are allowed to join, or a RoomLeftEvent
// if we are rejected or banned from the room.
message KnockRoomRequest {

    // The ID of the room that should be knocked.
    string roomId = 1;

    // A message that should be displayed to users receiving the knock request.
    // Might be an empty string if no message is set.
    string message = 2;
}

// Request a list public rooms.
message PublicRoomListRequest {

    // The maximum number of public rooms to be returned.
    optional uint32 limit = 1;

    // A pagniation token from a previous request.
    optional string since = 2;

    // An optional search term to filter the rooms.
    // Use an empty string if the rooms should not be filtered.
    string genericSearchTerm = 3;
}

// Response to a PublicRoomListRequest.
message PublicRoomListResponse {

    // The requested list of rooms.
    repeated PublicRoom roomList = 1;

    // A pagination token to return the next group of rooms.
    // Use this token in PublicRoomListRequest as the "since" token.
    optional string nextBatch = 2;
}

// Describes a public room entity.
message PublicRoom {

    // The ID of this room.
    string roomId = 1;

    // The display name of the room.
    // Might be an empty string if the room does not have any name.
    string displayName = 2;

    // The number of members inside this room.
    uint32 numJoinedMembers = 3;

    // The topic of this room.
    // Might be an empty string if no topic is set.
    string topic = 4;

    // The join rule of this room.
    RoomJoinRule joinRule = 5;
}

enum RoomJoinRule {

    // A user who wishes to join the room must first receive an invite
    // to the room from someone already inside of the room.
    Invite = 0;

    // Users can join the room if they are invited, or they can request an
    // invite to the room. They can be allowed or denied access.
    Knock = 1;

    // Anyone can join the room without any prior action.
    Public = 2;
}
