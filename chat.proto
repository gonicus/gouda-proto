syntax = "proto3";

package de.gonicus.gonnect;

// Generic container for any message that is sent to the headless client.
// Every message sent to the client must be wrapped in this container.
message RequestContainer {

    // A tag to identify this "to client" message and relate it to the response in "from client" message.
    // The value 0 means "no identification", i.e. a specific response is not expected.
    uint64 tag = 1;

    // The payload; one of these requests.
    oneof content {
        CapabilityRequest capabilityRequest = 2;
        SendOrEditMessageRequest sendOrEditMessageRequest = 3;
        RemoveMessageRequest removeMessageRequest = 4;
        BuddyListRequest buddyListRequest = 6;
        RoomListRequest roomListRequest = 7;
        ToggleReactionRequest toggleReactionRequest = 8;
        InitializationRequest initializationRequest = 9;
        LoginFlowsRequest loginFlowsRequest = 10;
        UsernamePasswordLoginRequest usernamePasswordLoginRequest = 11;
        SSOLoginRequest ssoLoginRequest = 12;
        IdentityProvidersRequest identityProvidersRequest = 13;
    }

    reserved 5;
    reserved "loginRequest";
}

// Generic container for any message that is sent from the headless client.
// Every message sent from the client must be wrapped in this container.
message ResponseContainer {

    // A tag to identify which "to client" message this belongs to.
    // The value 0 means "no identification", i.e. the message does not relate to a request.
    uint64 tag = 1;

    // The payload; one of these requests.
    oneof content {
        Error error = 2;
        CapabilityResponse capabilityResponse = 3;
        SendMessageResponse sendMessageResponse = 5;
        RemoveMessageEvent removeMessageEvent = 6;
        MessageReceivedEvent messageReceivedEvent = 7;
        BuddyListResponse buddyListResponse = 8;
        RoomListResponse roomListResponse = 9;
        ReactionEvent reactionEvent = 10;
        StatusUpdate statusUpdate = 11;
        LoginFlowsResponse loginFlowsResponse = 13;
        SSOLoginResponse ssoLoginResponse = 14;
        IdentityProvidersResponse identityProvidersResponse = 15;
    }

    reserved 4;
    reserved "loginResponse";
}

// Generic error occurred in the backend or the headless client.
message Error {

    enum errorType {

        // An error that cannot be described by any of the other values or its nature is unknown.
        // Using one of the other more specific error type is preferred.
        Unknown = 0;

        // When a response was not received in a pre-defined time.
        Timeout = 1;

        // The error happened with the network connection or failing transport.
        Network = 2;

        // Whenever the required authorization is missing.
        Authorization = 3;

        // The requested feature is not implemented for this client.
        NotImplemented = 4;

        // The client has not yet been initialized.
        NotInitialized = 5;

        // A string that should have been formatted as a URL was not a valid URL.
        InvalidUrl = 6;
    };

    // The type of this error.
    errorType type = 1;

    // An optional string describing details of the error.
    optional string errorString = 2;
}

// Initializes a client and establishes a connection to the specified backend.
// A StatusUpdate is returned when the connection was successful.
message InitializationRequest {
    // The URL of the backend to which a connection should be established.
    string backendUrl = 1;

    // Path to a readable and writable folder in the system which serves as a
    // root path for mutual data, like images.
    string dataRootPath = 2;
}

// Request to retrieve the login flows supported by the backend.
message LoginFlowsRequest { }

// Returns the login flows supported by the backend.
message LoginFlowsResponse {
    enum loginFlow {
        // If the backend supports username and password authentication.
        UsernamePassword = 0;

        // If the backend supports single sign-on authentication.
        SSO = 1;
    }

    // The supported login flows.
    repeated loginFlow loginFlows = 2;
}

// Request to log in to the client using username and password.
// Use LoginFlowsRequest to ensure that the backend supports this authentication method.
// A StatusUpdate is returned when the login request was successful.
message UsernamePasswordLoginRequest {
    string username = 1;
    string password = 2;
}

// Request to log in to the client using single sign-on.
// Use LoginFlowsRequest to ensure that the backend supports this authentication method.
message SSOLoginRequest {
    // The identity provider to be used for login.
    // Use IdentityProviderRequest to retrieve the available identity providers.
    optional string identityProvider = 1;
}

// Confirms the single sign-on authentication was initiated.
// A StatusUpdate is returned when the login request was successful and the access token was retrieved.
message SSOLoginResponse {
    // A url that must be opened in a web browser to continue the login process.
    string loginUrl = 1;
}

// Request to retrieve the available identity providers for single sing-on authentication.
message IdentityProvidersRequest { }

// Returns the available identity providers.
message IdentityProvidersResponse {
    // The ID of the available identity providers.
    // Use one of the returned IDs inside the SSOLoginRequest.
    repeated string identityProviders = 1;
}

// Notifies about changes in the connection state between headless client and backend.
message StatusUpdate {

    enum statusCode {

        // No connection is made.
        Disconnected = 0;

        // The server is connected, but the client is not authorized yet.
        Connected = 1;

        // The server is connected and the client is authorized.
        LoggedIn = 2;
    };

    // The current connection status.
    statusCode code = 1;
}

// Request the headless client to send the capabilities of the backend.
message CapabilityRequest { }

// The capabilities (supported features) of the backend.
message CapabilityResponse {

    // The backend supports direct communication between two participants.
    bool directRooms = 1;

    // The backend supports chat rooms between multiple participants.
    bool groupRooms = 2;

    // The backend supports creation of sub threads inside a chat room.
    bool subThreads = 3;

    // List of MIME types that can be send via the backend.
    repeated string mimeTypes = 4;
}

// Request to send a chat message.
message SendOrEditMessageRequest {

    // The message that shall be sent or modified.
    // If the messageId is not set, it means "send new message", an id is created and a SendMessageResponse is sent.
    // If the messageId is set, it means "edit existing message". The information of the Message object will then
    // be used to override the pre-existing information. MessageReceivedEvent is sent afterwards.
    Message messageContent = 1;
}

// Confirms that a message has been sent.
// A MessageReceivedEvent will not be created for messages that have been sent via this client.
message SendMessageResponse {

    // Unique id to identify the message (e.g. for later modification).
    string messageId = 1;
}

// Notifies about a received message from another participant or an edited message (by anyone).
message MessageReceivedEvent {

    // The actual message.
    Message messageContent = 1;
}

// Request the backend to retract and delete an existing message.
// Must result in an Error or RemoveMessageEvent.
message RemoveMessageRequest {

    // Id of the message.
    string messageId = 1;
}

// Event notifying that a message has been retracted and removed.
message RemoveMessageEvent {

    // Id of the removed message.
    string messageId = 1;
}

// Request list of all known buddies.
message BuddyListRequest {}

// Response for a buddy list request.
message BuddyListResponse {

    // List of buddies.
    repeated Buddy buddyList = 1;
}

// Request a list of rooms.
message RoomListRequest {

    // Whether the resulting list shall include room which the user is a member of.
    bool includeJoined = 1;

    // Whether the resulting list shall include room which the user is not a member of.
    bool includeUnjoined = 2;
}

// Response to a RoomListResponse.
message RoomListResponse {

    // The requested list of rooms.
    repeated Room roomList = 1;
}

// Request to have the current reaction status inverted for this user.
message ToggleReactionRequest {

    // The message to change the reaction for.
    string messageId = 1;

    // The reaction (e.g. emoji) to toggle.
    string reaction = 2;
}

// Sent when a reaction was added, removed or has changed in any other way.
// Changes triggered by the user themself are included.
// An empty participantList means that this reaction is not valid anymore.
message ReactionEvent {

    // The reaction information.
    Reaction reaction = 1;
}

// Describes a single buddy entity.
message Buddy {

    // Unique string which identifies the buddy.
    string buddyId = 1;

    // Optional nice name to display instead of the buddyId.
    optional string displayName = 2;
}

// Describes a room entity. This might be a room with several participants or just a direct chat between two.
message Room {

    // Unique string identifying the room.
    string roomId = 1;

    // Optional nice name to display instead of the roomId.
    optional string displayName = 2;

    // All participants of this room.
    repeated Buddy participantList = 3;
}

// Describes a chat message.
message Message {

    // Unique string identifying the message.
    // If the id is set by the backend, this field might be missing when sending a new message.
    optional string messageId = 1;

    // Id of the room this message is sent to.
    string roomId = 2;

    // Id of the sender, which might be a participant or the room itself in case of room messages.
    string senderId = 3;

    // Creation time of the message in milliseconds from 01.01.1970 00:00 UTC.
    uint64 timestamp = 4;

    // The MIME type of the content.
    string mimeType = 5;

    // The actual payload of the message. Encoding depends on mimeType.
    string content = 6;

    // The original message this relates to, e.g. when answering to a specific message.
    optional string relatedMessageId = 7;

    // Whether this message is pinned, i.e. prominently shown in the room.
    bool isPinned = 8;
}

// Describes a reaction to a message, e.g. attaching an emoji to it.
// A reaction is identified by messageId and reaction combined.
message Reaction {

    // Id of the message this reaction is for.
    string messageId = 1;

    // The actual reaction (e.g. emoji).
    string reaction = 2;

    // List of all users that made this reaction, including the own user as well.
    // If this list is empty, it means that this reaction does not exist any longer.
    repeated Buddy participantList = 3;
}



//Events
//  * Einladung
//  * Beitreten/Verlassen
//  * Lesebestätigung
//  * Tippt
